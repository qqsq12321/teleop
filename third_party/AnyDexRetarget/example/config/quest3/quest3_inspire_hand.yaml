# Inspire Hand Configuration for Retargeting
# 5 fingers with mimic joints

optimizer:
  type: "AdaptiveOptimizerAnalytical"

robot:
  type: "inspire_hand"
  urdf_path: "assets/inspire_hand/inspire_hand_right.urdf"

retarget:
  huber_delta: 2.0
  huber_delta_dir: 0.5
  norm_delta: 0.04
  w_pos: 1.0
  w_dir: 5.0
  scaling: 1.16
  project_tip_dir: false
  w_full_hand: 1.0

  segment_scaling:
    thumb:  [1.16, 1.16, 1.16]
    index:  [1.16, 1.16, 1.16]
    middle: [1.16, 1.16, 1.16]
    ring:   [1.16, 1.16, 1.16]
    pinky:  [1.16, 1.16, 1.16]

  pinch_thresholds:
    index:  { d1: 2.0, d2: 4.0 }
    middle: { d1: 2.0, d2: 4.0 }
    ring:   { d1: 2.0, d2: 4.0 }
    pinky:  { d1: 2.0, d2: 4.0 }

  mediapipe_rotation:
    x: 0.0
    y: 0.0
    z: -20.0

  lp_alpha: 0.4

render:
  camera:
    azimuth: 180
    elevation: -20
    distance: 0.5
