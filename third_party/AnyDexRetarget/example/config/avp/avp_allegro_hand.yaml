# Allegro Hand Configuration for Retargeting
# 4 fingers (thumb, index, middle, ring) x 4 joints = 16 DOF

optimizer:
  type: "AdaptiveOptimizerAnalytical"

robot:
  type: "allegro_hand"
  urdf_path: "assets/allegro_hand/allegro_hand_right.urdf"

retarget:
  huber_delta: 2.0
  huber_delta_dir: 0.5
  norm_delta: 0.04
  w_pos: 10.0
  w_dir: 5.0
  scaling: 0.35
  project_tip_dir: false
  w_full_hand: 1.0

  segment_scaling:
    thumb:  [0.85, 0.85, 0.85]
    index:  [0.85, 0.85, 0.85]
    middle: [0.85, 0.85, 0.85]
    ring:   [0.85, 0.85, 0.85]

  pinch_thresholds:
    index:  { d1: 2.0, d2: 4.0 }
    middle: { d1: 2.0, d2: 6.0 }
    ring:   { d1: 2.0, d2: 4.0 }

  mediapipe_rotation:
    x: 0.0
    y: 0.0
    z: 0.0

  lp_alpha: 0.4

render:
  camera:
    azimuth: 180
    elevation: -20
    distance: 0.5
