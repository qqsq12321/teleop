# Leap Hand Configuration for Retargeting
# 4 fingers (thumb, index, middle, ring) x 4 joints = 16 DOF

optimizer:
  type: "AdaptiveOptimizerAnalytical"

robot:
  type: "leap_hand"
  urdf_path: "assets/leap_hand/leap_hand_right.urdf"

retarget:
  huber_delta: 2.0
  huber_delta_dir: 0.5
  norm_delta: 0.04
  w_pos: 1.0
  w_dir: 5.0
  scaling: 1.2
  project_tip_dir: false
  w_full_hand: 1.0

  segment_scaling:
    thumb:  [1.15, 1.15, 1.15]
    index:  [1.15, 1.15, 1.15]
    middle: [1.15, 1.15, 1.15]
    ring:   [1.15, 1.15, 1.15]

  pinch_thresholds:
    index:  { d1: 2.0, d2: 4.0 }
    middle: { d1: 2.0, d2: 4.0 }
    ring:   { d1: 2.0, d2: 4.0 }

  mediapipe_rotation:
    x: 0.0
    y: 0.0
    z: 0.0

  lp_alpha: 0.4

render:
  camera:
    azimuth: 180
    elevation: -20
    distance: 0.5
