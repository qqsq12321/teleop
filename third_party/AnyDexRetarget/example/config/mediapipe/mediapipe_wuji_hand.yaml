# Wuji Hand Configuration for Retargeting
# 5 fingers x 4 joints = 20 DOF

optimizer:
  type: "AdaptiveOptimizerAnalytical"

robot:
  type: "wuji_hand"
  urdf_path: "assets/wuji_hand/right.urdf"

retarget:
  huber_delta: 2.0
  huber_delta_dir: 0.5
  norm_delta: 0.04
  w_pos: 1.0
  w_dir: 5.0
  scaling: 1.0
  project_tip_dir: false
  w_full_hand: 1.0

  segment_scaling:
    thumb:  [1.0, 1.0, 1.0]
    index:  [1.0, 1.0, 1.0]
    middle: [1.0, 1.0, 1.0]
    ring:   [1.0, 1.0, 1.0]
    pinky:  [1.0, 1.0, 1.0]

  pinch_thresholds:
    index:  { d1: 2.0, d2: 4.0 }
    middle: { d1: 2.0, d2: 4.0 }
    ring:   { d1: 2.0, d2: 4.0 }
    pinky:  { d1: 2.0, d2: 4.0 }

  mediapipe_rotation:
    x: 0.0
    y: 0.0
    z: 0.0

  lp_alpha: 0.4

render:
  camera:
    azimuth: 180
    elevation: -20
    distance: 0.5
