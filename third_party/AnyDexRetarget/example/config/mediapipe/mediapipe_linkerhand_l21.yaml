# LinkerHand L21 Configuration for Retargeting

optimizer:
  type: "AdaptiveOptimizerAnalytical"

robot:
  type: "linkerhand_l21"

retarget:
  huber_delta: 2.0
  huber_delta_dir: 0.5
  norm_delta: 0.04
  w_pos: 1.0
  w_dir: 5.0
  scaling: 1.2
  project_tip_dir: false
  w_full_hand: 1.0

  segment_scaling:
    thumb:  [1.1, 1.1, 1.1]
    index:  [1.2, 1.2, 1.2]
    middle: [1.2, 1.2, 1.2]
    ring:   [1.2, 1.2, 1.2]
    pinky:  [1.2, 1.2, 1.2]

  pinch_thresholds:
    index:  { d1: 2.0, d2: 4.0 }
    middle: { d1: 2.0, d2: 4.0 }
    ring:   { d1: 2.0, d2: 4.0 }
    pinky:  { d1: 2.0, d2: 4.0 }

  mediapipe_rotation:
    x: 0.0
    y: 0.0
    z: -20.0

  lp_alpha: 0.4

render:
  camera:
    azimuth: 180
    elevation: -20
    distance: 0.5
