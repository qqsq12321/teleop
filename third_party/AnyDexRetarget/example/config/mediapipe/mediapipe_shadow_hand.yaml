# Shadow Hand Configuration for Retargeting
# Uses high-quality meshes from MuJoCo Menagerie
# Adaptive blend: TipDirVec when pinching, FullHandVec otherwise
# Loss: L = Σ (α_i * L_tip_dir_vec_i + (1-α_i) * L_full_hand_i) + norm_delta * ||Δq||²
# Uses Huber loss + analytical gradients + NLopt SLSQP

optimizer:
  type: "AdaptiveOptimizerAnalytical"

# Robot configuration for Shadow Hand (rh_ prefix)
robot:
  type: "shadow_hand"
  # Link names (matching shadow_hand_description/urdf/right_rh.urdf with rh_ prefix):
  # - rh_palm, rh_thtip/rh_fftip/rh_mftip/rh_rftip/rh_lftip
  # - rh_thproximal/rh_ffproximal/rh_mfproximal/rh_rfproximal/rh_lfproximal
  # - rh_thmiddle/rh_ffmiddle/rh_mfmiddle/rh_rfmiddle/rh_lfmiddle
  # - rh_thdistal/rh_ffdistal/rh_mfdistal/rh_rfdistal/rh_lfdistal

retarget:
  # Huber loss thresholds
  huber_delta: 2.0             # Position Huber threshold (cm)
  huber_delta_dir: 0.5         # Direction Huber threshold

  # Regularization
  norm_delta: 0.04             # Velocity regularization weight

  # TipDirVec parameters
  w_pos: 1.0                   # Tip position weight (wrist → tip vectors)
  w_dir: 5.0                   # Tip direction weight (link4 → tip vectors)
                               # Note: High w_dir conflicts with pinch optimization
                               # Use 5.0 for better pinch accuracy, 10.0 for finger direction
  scaling: 0.81                # Scale MediaPipe to match Shadow Hand size (MP is ~24% larger)
  project_tip_dir: false       # Whether to project tip direction

  # FullHandVec parameters
  w_full_hand: 1.0             # Full hand vec weight

  # Per-finger segment scaling [PIP, DIP, TIP]
  # Adjust based on Shadow Hand kinematics
  segment_scaling:
    thumb:  [1.0, 1.0, 1.0]
    index:  [1.0, 1.0, 1.0]
    middle: [1.0, 1.0, 1.0]
    ring:   [1.0, 1.0, 1.0]
    pinky:  [1.0, 1.0, 1.0]

  # Pinch distance thresholds (cm) for each finger
  # d < d1: TipDirVec mode (α=1), d > d2: FullHandVec mode (α=0)
  pinch_thresholds:
    index:  { d1: 2.0, d2: 4.0 }
    middle: { d1: 2.0, d2: 4.0 }
    ring:   { d1: 2.0, d2: 4.0 }
    pinky:  { d1: 2.0, d2: 4.0 }

  # MediaPipe rotation adjustment (degrees)
  mediapipe_rotation:
    x: -10.0
    y: 0.0
    z: -90.0

  # Clamp joint lower bounds to prevent hyperextension
  # Pattern matches joint names containing the key, sets minimum lower bound
  clamp_joint_lower:
    "J3": 0.0                   # Prevent MCP hyperextension for FF/MF/RF/LF

  # Low-pass filter coefficient (0~1, smaller=smoother)
  lp_alpha: 0.4

render:
  camera:
    azimuth: 180
    elevation: 0.0
    distance: 1.0
