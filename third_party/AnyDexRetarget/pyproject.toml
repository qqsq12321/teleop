[build-system]
requires = ["setuptools>=64.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "anydexretarget"
version = "0.1.0"
description = "High-precision hand pose retargeting system with adaptive analytical optimization for multiple dexterous hands"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Shiquan Qiu", email = "932851972@qq.com"},
]
keywords = ["retargeting", "dexterous-hand", "teleoperation", "hand-tracking", "mujoco"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.21.0",
    "nlopt",
    "pyyaml",
]

[project.urls]
Homepage = "https://github.com/qqsq12321/AnyDexRetarget"
Repository = "https://github.com/qqsq12321/AnyDexRetarget"
Issues = "https://github.com/qqsq12321/AnyDexRetarget/issues"

[tool.setuptools]
packages = ["anydexretarget", "anydexretarget.optimizer"]
